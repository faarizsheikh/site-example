<!-- app.html: -->
<div [class.menu-open]="isMenuOpen">


  <app-burger-menu
    [isOpen]="isMenuOpen"
    (click)="toggleMenu()"
  ></app-burger-menu>

  <div
    class="page-content"
    [attr.inert]="isMenuOpen ? '' : null"
    [attr.aria-hidden]="isMenuOpen ? 'true' : null"
  >
    <app-header></app-header>
    <router-outlet></router-outlet>
    <app-footer></app-footer>
  </div>
</div>
