<!-- header.html: -->

<header class="header-main">

  <div class="header-main-logo">
    <!-- LOGO: -->
    <a [routerLink]="ROUTE_LINKS.HOME" routerLinkActive="active" aria-label="Home">
      <img
        ngSrc="../../../assets/Images/Header/faariz-logo-1.png"
        alt="Faariz Haider Sheikh logo"
        height="40"
        width="100"
        priority
      />
    </a>

    <!-- NAVIGATION: -->
    <nav class="header-main-nav" aria-label="Primary navigation">
      <ul>

        @for (link of ROUTE_LINKS_ARRAY; track link.path) {
          @if (link.label != "HOME") {
            <li>
              <a
                [routerLink]="link.path"
                routerLinkActive="active"
                #rla="routerLinkActive"
                [attr.aria-current]="rla.isActive ? 'page' : null"
              >
                {{ link.label }}
              </a>
            </li>}
        }

        <!-- Resume: -->
        <li>
          <a
            href="../../../assets/PDFs/faariz-resume.pdf"
            target="_blank"
            rel="noopener"
            aria-label="Resume, opens in new tab"
          >
            RESUME
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- SOCIAL MEDIA: -->
  <div class="header-main-sm">

    @for (SOCIAL_LINK of SOCIAL_LINKS; track SOCIAL_LINK) {

      <a
        [href]="SOCIAL_LINK.href"
        target="_blank"
        rel="noopener"
        [attr.aria-label]="SOCIAL_LINK.aria_label + ', opens in new tab'"
      >

      @if (SOCIAL_LINK.class_suffix === 'kdp') {
        <div
          class="sm header-main-sm-kdp"
          (mouseenter)="playVideo()"
          (mouseleave)="pauseVideo()"
          aria-hidden="true"
        >
          <video
            #video
            src="assets/Videos/book-flip.mp4"
            [loop]="true"
            [muted]="true"
            playsinline
            preload="auto"
            aria-hidden="true"
          ></video>
        </div>
      } @else {
        <div
          [class]="'sm ' + class_prefix + '-' + SOCIAL_LINK.class_suffix"
          aria-hidden="true"
        ></div>
      }
      </a>
    }
  </div>
</header>
