<!-- burger-menu.html: -->

<!-- BURGER MENU BUTTON -->
<button
  type="button"
  class="burger-menu-btn"
  [class.open]="isOpen"
  [attr.aria-expanded]="isOpen"
  [attr.aria-label]="isOpen ? 'Close menu' : 'Open menu'"
  aria-controls="burger-menu"
>
</button>

<!-- BURGER MENU -->
<nav   id="burger-menu"
       class="burger-menu"
       [class.open]="isOpen"
       aria-label="Main navigation"
>
  <ul>

    @for (link of ROUTE_LINKS_ARRAY; track link.path) {
      <li>
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          #rla="routerLinkActive"
          [attr.aria-current]="rla.isActive ? 'page' : null"
        >
          {{ link.label }}
        </a>
      </li>
    }

    <li>
      <a
        href="../../../assets/pdfs/faariz-resume.pdf"
        target="_blank"
        rel="noopener"
        aria-label="Resume, opens in new tab"
      >RESUME</a>
    </li>

    <li class="burger-social-version">
      <div class="burger-social-icons">
        @for (SOCIAL_LINK of SOCIAL_LINKS; track SOCIAL_LINK) {
        <a
          [href]="SOCIAL_LINK.href"
          target="_blank"
          rel="noopener"
          [attr.aria-label]="SOCIAL_LINK.aria_label + ', opens in new tab'">
          <div [class]="class_prefix + '-bm-' + SOCIAL_LINK.class_suffix" aria-hidden="true"></div>
        </a>
        }
      </div>
      <span id="version-number2">V{{versionNum}}</span><br>
      <span id="copyright-notice2">© {{currentYear}} Faariz Haider Sheikh</span>
    </li>
  </ul>
</nav>
